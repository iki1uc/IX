<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>UP · verify</title>

<!-- Prefetch -->
<link rel="prefetch" href="./index.html">
<link rel="prefetch" href="./time_3x11_scroll_zoom.html">
<link rel="prefetch" href="./scan.mode">
<link rel="prefetch" href="./grml.mode">

<style>
body { background:#000; color:#0f0; font-family:Consolas; padding:20px; }
pre  { background:#111; border:1px solid #333; padding:12px; white-space:pre-wrap; }
h1   { color:#6cf; }
</style>
</head>

<body>

<h1>UP · Verifikation</h1>

<pre id="verify_out">
VERIFY      = aktiv
MODE        = GRML
STATE       = rdy
LEVEL       = rot

CACHE.IN    = index.html / time_3x11_scroll_zoom.html
CACHE.OUT   = t / T

GRML.SCAN   = aktiv
GRML.CHECK  = läuft...
</pre>

<script>
// GRML-Engine
async function GRML_SCAN(){
    const files = [
        "index.html",
        "time_3x11_scroll_zoom.html",
        "scan.mode",
        "grml.mode"
    ];

    const result = {
        ok: [],
        miss: []
    };

    for(const f of files){
        try {
            const res = await fetch(`./${f}`);
            if(res.ok){
                result.ok.push(f);
            } else {
                result.miss.push(f);
            }
        } catch(e){
            result.miss.push(f);
        }
    }

    return result;
}

// Render
(async () => {
    const out = document.getElementById("verify_out");
    const scan = await GRML_SCAN();

    out.innerHTML += "\nGRML.OK      = " + JSON.stringify(scan.ok);
    out.innerHTML += "\nGRML.MISS    = " + JSON.stringify(scan.miss);
})();
</script>

</body>
</html>
