<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>IX · verify</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas; padding:20px; }
pre  { background:#111; border:1px solid #333; padding:12px; white-space:pre-wrap; }
h1   { color:#6cf; }
.rot { color:#ff4444; }
.gelb { color:#ffcc00; }
.gruen { color:#00ff88; }
</style>
</head>

<body>

<h1>IX · Verifikation (GRML)</h1>

<pre id="verify_out">
VERIFY      = aktiv
MODE        = GRML
STATE       = rdy
LEVEL       = rot

SCAN        = läuft...
</pre>

<script src="./grml.ix.mode"></script>

<script>
(async () => {
    const out = document.getElementById("verify_out");
    const scan = await GRML_IX.scan();

    out.innerHTML += "\n\nROT (kritisch):\n" + scan.rot.map(f => " - " + f).join("\n");
    out.innerHTML += "\n\nGELB (warn):\n" + scan.gelb.map(f => " - " + f).join("\n");
    out.innerHTML += "\n\nGRÜN (ok):\n" + scan.gruen.map(f => " - " + f).join("\n");
})();
</script>

</body>
</html>
