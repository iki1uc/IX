<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IX · NC-Transportstation</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#6cf; text-align:center; }

#geo {
    width: 360px;
    height: 360px;
    margin: auto;
    border: 3px solid #6cf;
    border-radius: 50%;
    position: relative;
    animation: spin 10s linear infinite;
}

.dot {
    width: 10px;
    height: 10px;
    background:#0f0;
    border-radius:50%;
    position:absolute;
}

pre {
    background:#111;
    padding:20px;
    border-left:3px solid #6cf;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}
</style>

<script src="IX.core.js"></script>
<script src="IX.scan.js"></script>
<script src="IX.kernel.js"></script>
<script src="IX.vector.js"></script>
<script src="IX.matrix.js"></script>
<script src="IX.pipe.js"></script>

</head>

<body>

<h1>IX · NC-Transportstation</h1>

<div id="geo"></div>
<pre id="status">Lade IX…</pre>

<script>
const geo = document.getElementById("geo");
const count = 81;
const radius = 160;

for(let i=0; i<count; i++){
    const dot = document.createElement("div");
    dot.className = "dot";

    const angle = (i / count) * Math.PI * 2;
    const x = Math.cos(angle) * radius + 180 - 5;
    const y = Math.sin(angle) * radius + 180 - 5;

    dot.style.left = x + "px";
    dot.style.top = y + "px";

    geo.appendChild(dot);
}

IX.enter(55);
IX.scan = IX_SCAN.detect(IX.input);
IX.kernel = IX_KERNEL.process(IX.scan.hash);
IX.vector = IX_VECTOR.build(IX.kernel.core);
IX.matrix = IX_MATRIX.build(IX.kernel.core);

const result = IX.compute();
const forward = IX_PIPE.forward(result);

document.getElementById("status").innerText =
    JSON.stringify({ IX: result, forward }, null, 2);
</script>

</body>
</html>
